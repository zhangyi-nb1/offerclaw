<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfferClaw · CareerFlow 流程</title>
<style>
  :root {
    --bg: #FAFAF9;
    --surface: #FFFFFF;
    --surface-2: #F5F5F4;
    --surface-hover: #F0EFEE;
    --border: #E7E5E4;
    --border-strong: #D6D3D1;
    --text: #1C1917;
    --text-secondary: #57534E;
    --text-muted: #A8A29E;
    --accent: #D97757;
    --accent-hover: #C56342;
    --accent-soft: #FBEFE9;
    --success: #10B981;
    --success-soft: #ECFDF5;
    --warning: #F59E0B;
    --warning-soft: #FFFBEB;
    --error: #EF4444;
    --error-soft: #FEF2F2;
    --shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.04);
    --shadow: 0 1px 3px rgba(28, 25, 23, 0.06), 0 1px 2px rgba(28, 25, 23, 0.04);
    --shadow-lg: 0 8px 24px rgba(28, 25, 23, 0.08), 0 2px 6px rgba(28, 25, 23, 0.04);
    --radius-sm: 6px;
    --radius: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --font-mono: ui-monospace, "SF Mono", Consolas, monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root[data-theme="auto"] {
      --bg: #1A1A1A;
      --surface: #262626;
      --surface-2: #2D2D2D;
      --surface-hover: #333333;
      --border: #404040;
      --border-strong: #525252;
      --text: #FAFAF9;
      --text-secondary: #D4D4D8;
      --text-muted: #78716C;
      --accent: #E09975;
      --accent-hover: #ECAB87;
      --accent-soft: #3D2920;
      --success-soft: #064E3B;
      --warning-soft: #451A03;
      --error-soft: #450A0A;
    }
  }
  :root[data-theme="dark"] {
    --bg: #1A1A1A;
    --surface: #262626;
    --surface-2: #2D2D2D;
    --surface-hover: #333333;
    --border: #404040;
    --border-strong: #525252;
    --text: #FAFAF9;
    --text-secondary: #D4D4D8;
    --text-muted: #78716C;
    --accent: #E09975;
    --accent-hover: #ECAB87;
    --accent-soft: #3D2920;
    --success-soft: #064E3B;
    --warning-soft: #451A03;
    --error-soft: #450A0A;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  button { font: inherit; cursor: pointer; }
  input, textarea { font: inherit; color: inherit; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  pre { font-family: var(--font-mono); font-size: 12.5px; }

  .page { max-width: 980px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ===== Header ===== */
  .page-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }
  .page-mark {
    width: 38px; height: 38px;
    border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    box-shadow: var(--shadow-sm);
  }
  .page-title { font-size: 22px; font-weight: 600; }
  .page-meta { font-size: 13px; color: var(--text-secondary); margin-top: 4px; margin-bottom: 24px; }
  .page-meta code { background: var(--surface-2); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  .page-nav { display: flex; gap: 16px; margin-bottom: 32px; font-size: 13px; }
  .page-nav a { color: var(--text-secondary); display: inline-flex; align-items: center; gap: 6px; }
  .page-nav a:hover { color: var(--accent); text-decoration: none; }
  .page-nav a svg { width: 14px; height: 14px; }

  /* ===== Input panel ===== */
  .input-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px;
    margin-bottom: 28px;
    box-shadow: var(--shadow-sm);
  }
  .input-panel-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
    font-size: 13px; color: var(--text-secondary);
  }
  .input-panel-head .label {
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; font-size: 11.5px;
  }
  .input-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
  textarea.jd {
    flex: 1;
    min-width: 280px;
    min-height: 110px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13.5px;
    font-family: var(--font-sans);
    line-height: 1.55;
    resize: vertical;
    outline: none;
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  textarea.jd:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  input.title {
    width: 220px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    outline: none;
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input.title:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-size: 13.5px;
    font-weight: 500;
    transition: background 0.12s, transform 0.05s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { background: var(--text-muted); border-color: var(--text-muted); cursor: not-allowed; }
  .btn.secondary { background: transparent; color: var(--text); border-color: var(--border-strong); }
  .btn.secondary:hover { background: var(--surface-hover); }
  .btn svg { width: 14px; height: 14px; }

  /* ===== Stepper ===== */
  .stepper {
    position: relative;
    padding-left: 28px;
  }
  /* Connector line behind nodes */
  .stepper::before {
    content: '';
    position: absolute;
    left: 18px;
    top: 16px;
    bottom: 16px;
    width: 2px;
    background: var(--border);
  }
  .step {
    position: relative;
    margin-bottom: 14px;
  }
  .step-node {
    position: absolute;
    left: -28px;
    top: 16px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    z-index: 1;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }
  .step.run .step-node { border-color: var(--warning); background: var(--warning-soft); color: var(--warning); animation: pulse-ring 1.4s ease-in-out infinite; }
  .step.done .step-node { border-color: var(--success); background: var(--success); color: #fff; }
  .step.err .step-node { border-color: var(--error); background: var(--error); color: #fff; }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 0 0 var(--warning-soft); }
    50% { box-shadow: 0 0 0 6px var(--warning-soft); }
  }
  .step-node svg { width: 12px; height: 12px; }

  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .step:hover .step-card { border-color: var(--border-strong); }
  .step.done .step-card { border-left: 3px solid var(--success); }
  .step.err .step-card { border-left: 3px solid var(--error); }
  .step.run .step-card { border-left: 3px solid var(--warning); }

  .step-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }
  .step-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .step-status-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--text-secondary);
    font-weight: 500;
    flex-shrink: 0;
  }
  .step.run .step-status-tag { background: var(--warning-soft); color: var(--warning); }
  .step.done .step-status-tag { background: var(--success-soft); color: var(--success); }
  .step.err .step-status-tag { background: var(--error-soft); color: var(--error); }
  .step-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .step-body { font-size: 13px; color: var(--text-secondary); }
  .step-body pre {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    margin-top: 8px;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 220px;
    overflow: auto;
  }
  .step-body ol { padding-left: 22px; margin-top: 6px; }
  .step-body ol li { margin: 4px 0; }

  .chip {
    display: inline-flex;
    align-items: center;
    background: var(--surface-2);
    color: var(--text-secondary);
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11.5px;
    border: 1px solid var(--border);
    margin: 2px 4px 2px 0;
  }
  .chip.ok { background: var(--success-soft); color: var(--success); border-color: transparent; }
  .chip.warn { background: var(--warning-soft); color: var(--warning); border-color: transparent; }
  .chip.err { background: var(--error-soft); color: var(--error); border-color: transparent; }
  .chip.accent { background: var(--accent-soft); color: var(--accent); border-color: transparent; }

  /* ===== Summary ===== */
  .summary {
    margin-top: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 18px 22px;
    box-shadow: var(--shadow-sm);
    display: none;
  }
  .summary.show { display: block; }
  .summary-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .summary-head svg { width: 18px; height: 18px; color: var(--accent); }
  .summary-head .title { font-weight: 600; font-size: 14px; }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 720px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
  .summary-cell {
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    border: 1px solid var(--border);
  }
  .summary-cell .k { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .summary-cell .v { font-size: 18px; font-weight: 600; margin-top: 2px; color: var(--text); }

  /* ===== Theme toggle (fixed corner) ===== */
  .theme-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 38px; height: 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
    color: var(--text-secondary);
    z-index: 40;
    transition: border-color 0.15s, color 0.15s;
  }
  .theme-toggle:hover { border-color: var(--border-strong); color: var(--text); }
  .theme-toggle svg { width: 18px; height: 18px; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text);
    color: var(--bg);
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    z-index: 50;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="page">

  <div class="page-head">
    <div class="page-mark">OC</div>
    <div>
      <div class="page-title">CareerFlow 流程</div>
      <div class="page-meta">
        8 步流程：画像 → JD → 匹配 → 缺口 → 计划 → 今日建议 → 简历素材 → 投递判断
      </div>
    </div>
  </div>

  <div class="page-nav">
    <a href="/ui?rev=latest">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      返回工作台
    </a>
  </div>

  <!-- Input -->
  <div class="input-panel">
    <div class="input-panel-head">
      <span class="label">输入 JD</span>
      <span>粘贴公司 / 岗位 / 地点 / 要求 / 职责</span>
    </div>
    <div class="input-row">
      <textarea class="jd" id="jd" placeholder="粘贴一份 JD 原文，或只贴技术要求几行也可以..."></textarea>
      <input class="title" id="title" placeholder="JD 标题（可选）"/>
      <button class="btn" id="run">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        运行 CareerFlow
      </button>
    </div>
  </div>

  <!-- Stepper -->
  <div class="stepper" id="stepper"></div>

  <!-- Summary -->
  <div class="summary" id="summary"></div>

</div>

<button class="theme-toggle" id="themeToggle" title="切换主题">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="toast" id="toast"></div>

<script>
const STEPS = [
  {key:"profile",             title:"加载用户画像",  desc:"读取你的求职画像"},
  {key:"job_input",            title:"导入 JD",       desc:"整理岗位信息"},
  {key:"match",                title:"规则版匹配",     desc:"判断当前是否适合投递"},
  {key:"gap",                  title:"分析缺口",       desc:"拆出需要补齐的能力和经历"},
  {key:"plan",                 title:"4 周计划骨架",   desc:"生成可执行的行动框架"},
  {key:"today",                title:"今日执行建议",   desc:"给出今天最该做的事"},
  {key:"resume",               title:"简历骨架",       desc:"整理可用于简历的素材"},
  {key:"application_suggest",  title:"投递建议",       desc:"判断是否加入投递池"},
];

function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderInitial(){
  const root = document.getElementById("stepper");
  root.innerHTML = STEPS.map((s, i) => `
    <div class="step" id="step-${s.key}">
      <div class="step-node" id="node-${s.key}">${i + 1}</div>
      <div class="step-card">
        <div class="step-head">
          <div class="step-title">${s.title}</div>
          <span class="step-status-tag" id="tag-${s.key}">待执行</span>
        </div>
        <div class="step-desc">${s.desc}</div>
        <div class="step-body" id="body-${s.key}"><span style="color:var(--text-muted)">等待 CareerFlow 启动…</span></div>
      </div>
    </div>
  `).join('');
}

function setStep(key, status, tagText, html){
  const card = document.getElementById('step-' + key);
  const tag = document.getElementById('tag-' + key);
  const node = document.getElementById('node-' + key);
  if (!card) return;
  card.classList.remove('done', 'run', 'err');
  if (status) card.classList.add(status);
  tag.textContent = tagText || '';
  // Node icon: pending = number, done = check, err = !, run = number
  if (status === 'done') {
    node.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  } else if (status === 'err') {
    node.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  } else {
    const idx = STEPS.findIndex(s => s.key === key);
    node.textContent = idx + 1;
  }
  document.getElementById('body-' + key).innerHTML = html;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

async function run(){
  const jd = document.getElementById('jd').value.trim();
  const title = document.getElementById('title').value.trim() || '未命名 JD';
  if (!jd) { showToast('请粘贴 JD 原文'); return; }
  const btn = document.getElementById('run');
  btn.disabled = true;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>运行中…`;
  document.getElementById('summary').classList.remove('show');
  STEPS.forEach(s => setStep(s.key, 'run', '运行中', '<span style="color:var(--warning)">执行中…</span>'));
  try {
    const r = await fetch('/api/flow/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({jd_text: jd, jd_title: title, skip_llm: true})
    });
    if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + await r.text());
    const d = await r.json();
    renderResults(d);
  } catch (e) {
    STEPS.forEach(s => setStep(s.key, 'err', '失败', `<span style="color:var(--error)">${escapeHtml(e.message || e)}</span>`));
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>运行 CareerFlow';
  }
}

function renderResults(d){
  const trace = new Set((d.trace || []).map(x => x.node));

  // 1 profile
  setStep('profile', trace.has('profile') ? 'done' : 'err', trace.has('profile') ? '完成' : '未执行',
    `<div>已加载 profile（user_profile.md）</div>
     <div style="margin-top:8px">${d.match_report?.direction ? `<span class="chip accent">${escapeHtml(d.match_report.direction)}</span>` : ''}</div>`);

  // 2 job_input
  setStep('job_input', trace.has('job_input') ? 'done' : 'err', trace.has('job_input') ? '完成' : '未执行',
    `<span class="chip ok">JD 已纳入流程</span>`);

  // 3 match
  const mr = d.match_report || {};
  const kind = mr.status === '当前适合投递' ? 'ok' : mr.status === '当前暂不建议投递' ? 'err' : 'warn';
  setStep('match', trace.has('match') ? 'done' : 'err', trace.has('match') ? '完成' : '未执行',
    `<div><span class="chip ${kind}">${escapeHtml(mr.status || '-')}</span>
       <span class="chip">${escapeHtml(mr.direction || '-')}</span></div>
     <pre>${escapeHtml((mr.summary || '').slice(0, 500))}</pre>`);

  // 4 gap
  const gaps = d.gaps || {};
  const gapTotal = Object.values(gaps).reduce((s, v) => s + (Array.isArray(v) ? v.length : 0), 0);
  setStep('gap', trace.has('gap') ? 'done' : 'err', trace.has('gap') ? '完成' : '未执行',
    `<div>缺口总数 <span class="chip warn">${gapTotal}</span></div>
     <pre>${escapeHtml(JSON.stringify(gaps, null, 2).slice(0, 600))}</pre>`);

  // 5 plan
  const plan = d.plan_outline || [];
  setStep('plan', trace.has('plan') ? 'done' : 'err', trace.has('plan') ? `${plan.length} 周` : '未执行',
    plan.length
      ? `<div>${plan.length} 周计划骨架：</div>
         <ol>${plan.map(w => `<li><strong>${escapeHtml(String(w.title || w.week || ''))}</strong> · ${escapeHtml(String(w.focus || w.tasks || '').slice(0, 80))}</li>`).join('')}</ol>`
      : `<span class="chip">无可生成内容</span>`);

  // 6 today
  const t = d.today_advice || {};
  setStep('today', trace.has('today') ? 'done' : 'err', trace.has('today') ? '完成' : '未执行',
    `<div><strong>${escapeHtml(t.headline || '')}</strong></div>
     <pre>${escapeHtml((t.detail || t.next_action || '').slice(0, 350))}</pre>`);

  // 7 resume
  const rs = d.resume_skeleton || {};
  const keywords = rs.keywords_hit || rs.matched_keywords || [];
  setStep('resume', trace.has('resume') ? 'done' : 'err', trace.has('resume') ? `${keywords.length} 命中` : '未执行',
    `<div>模式 <span class="chip">${escapeHtml(rs.mode || '-')}</span>
       命中关键词 <span class="chip ok">${keywords.length}</span></div>
     <div style="margin-top:8px">${keywords.slice(0, 16).map(k => `<span class="chip">${escapeHtml(String(k))}</span>`).join('')}</div>`);

  // 8 application_suggest
  const a = d.application_suggestion || {};
  const conf = (d.requires_confirmation || []).filter(c => (c.target_file || '').includes('applications.md'));
  const appKind = a.decision && a.decision.includes('适合') ? 'ok' : 'warn';
  setStep('application_suggest', trace.has('application_suggest') ? 'done' : 'err', trace.has('application_suggest') ? '完成' : '未执行',
    `<div>决策 <span class="chip ${appKind}">${escapeHtml(a.decision || '-')}</span></div>
     <div style="margin-top:8px;font-size:12px;color:var(--text-muted)">待确认 patch：${conf.length}</div>
     ${conf.length ? `<pre>${escapeHtml(JSON.stringify(conf[0], null, 2).slice(0, 500))}</pre>` : ''}`);

  // Summary
  const s = document.getElementById('summary');
  s.classList.add('show');
  s.innerHTML = `
    <div class="summary-head">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="title">运行总览</span>
    </div>
    <div class="summary-grid">
      <div class="summary-cell"><div class="k">Trace 节点</div><div class="v">${(d.trace || []).length} / 8</div></div>
      <div class="summary-cell"><div class="k">缺口总数</div><div class="v">${gapTotal}</div></div>
      <div class="summary-cell"><div class="k">计划周数</div><div class="v">${plan.length}</div></div>
      <div class="summary-cell"><div class="k">简历关键词</div><div class="v">${keywords.length}</div></div>
      <div class="summary-cell"><div class="k">待确认 patch</div><div class="v">${(d.requires_confirmation || []).length}</div></div>
      <div class="summary-cell"><div class="k">错误数</div><div class="v" style="color:${(d.errors || []).length ? 'var(--error)' : 'var(--success)'}">${(d.errors || []).length}</div></div>
    </div>`;
}

document.getElementById('run').addEventListener('click', run);
document.getElementById('themeToggle').addEventListener('click', () => {
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : (cur === 'light' ? 'auto' : 'dark');
  html.setAttribute('data-theme', next);
  showToast(`主题：${next === 'auto' ? '跟随系统' : (next === 'dark' ? '深色' : '浅色')}`);
});

renderInitial();
</script>
</body>
</html>
